<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picky — Cronograma da Semana</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <h1 class="logo">Picky</h1>
        </div>
        <nav class="main-nav">
            <a href="index.html" class="nav-link active">Cronograma e Compras</a>
            <a href="perfil.html" class="nav-link">Perfis e Restrições</a>
            <a href="dashboard.html" class="nav-link">Dashboard API</a>
        </nav>
    </header>

    <main class="content-container">
        <div style="margin-bottom: 24px; display: flex; gap: 12px;">
            <button class="nav-btn active" data-view="dashboard">Visão Detalhada</button>
            <button class="nav-btn" data-view="simple-weekly">Resumo Semanal</button>
        </div>

        <section id="dashboard-view" class="view-section" style="display: block;">
            <div class="view-header">
                <h2>Refeições Compartilhadas</h2>
                <p class="subtitle">Visão geral do que será feito na cozinha e como cada um vai montar o prato.</p>
            </div>
            <div id="schedule-container">
                </div>

            <div class="view-header" style="margin-top: 48px;">
                <h2>Lista de Compras</h2>
                <p class="subtitle">Consolidado da semana para a casa</p>
            </div>
            <div class="card" id="shopping-container">
                </div>
        </section>

        <section id="simple-weekly-view" class="view-section" style="display: none;">
            <div class="view-header">
                <h2>Cardápio Simplificado</h2>
                <p class="subtitle">Apenas as refeições da semana, de segunda a domingo.</p>
            </div>
            <div class="weekly-grid" id="simple-weekly-container">
                </div>
        </section>
    </main>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
